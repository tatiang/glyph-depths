<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Easing Off the Gas</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --bg-dark: #050508;
      --text: #c8c8d0;
      --text-dim: #555566;
      --gold: #f0c040;
      --accent: #7070c0;
      --panel: #12121a;
      --panel-border: #2a2a3a;
      --danger: #c04040;
      --hp-high: #40c040;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    h1 {
      font-size: 14px;
      letter-spacing: 3px;
      color: var(--text-dim);
      margin-bottom: 16px;
      text-transform: uppercase;
    }
    canvas {
      display: block;
      border: 1px solid var(--panel-border);
      border-radius: 4px;
      image-rendering: pixelated;
    }
    #info {
      margin-top: 14px;
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <h1>Easing Off the Gas</h1>
  <canvas id="c"></canvas>
  <div id="info">DECELERATING</div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    const W = 600, H = 360;
    canvas.width = W;
    canvas.height = H;

    // ── Palette ──────────────────────────────────────────────────────────────
    const COL = {
      bg:        '#0a0a0f',
      road:      '#1a1a26',
      roadLine:  '#2a2a3a',
      asphalt:   '#14141e',
      car:       '#3a3a5a',
      carAccent: '#7070c0',
      carGlass:  '#1e2a3a',
      wheel:     '#0e0e14',
      wheelRim:  '#555566',
      exhaust:   '#2a2a3a',
      pedal:     '#2e2e48',
      pedalOn:   '#7070c0',
      foot:      '#c8b090',
      footShoe:  '#2a1a0a',
      speedHi:   '#f0c040',
      speedLo:   '#40c040',
      danger:    '#c04040',
      text:      '#c8c8d0',
      textDim:   '#555566',
      glow:      'rgba(112,112,192,0.18)',
    };

    // ── Animation state ───────────────────────────────────────────────────────
    let t = 0;               // frame counter
    const FPS    = 60;
    const CYCLE  = 5 * FPS;  // 5-second loop

    // road stripe scroll
    let stripeX = 0;

    // ── Easing helpers ────────────────────────────────────────────────────────
    function easeOutQuad(x) { return 1 - (1 - x) * (1 - x); }
    function easeInOutCubic(x) {
      return x < 0.5 ? 4 * x * x * x : 1 - Math.pow(-2 * x + 2, 3) / 2;
    }
    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

    // ── Per-frame derived values ──────────────────────────────────────────────
    function getState() {
      const p = (t % CYCLE) / CYCLE;  // 0..1 progress through loop

      // Phase timing:
      //   0.00 – 0.15  foot descends onto gas, car accelerates to cruise speed
      //   0.15 – 0.30  cruising at full speed
      //   0.30 – 0.55  foot lifts off gas
      //   0.55 – 0.85  car decelerates
      //   0.85 – 1.00  pause at low speed before next loop

      let footLift;  // 0 = fully pressed, 1 = fully lifted
      if (p < 0.15)       footLift = 1 - easeInOutCubic(p / 0.15);
      else if (p < 0.30)  footLift = 0;
      else if (p < 0.55)  footLift = easeInOutCubic((p - 0.30) / 0.25);
      else                footLift = 1;

      // Speed: 0 = stopped, 1 = full cruise
      let speed;
      if (p < 0.15)       speed = easeOutQuad(p / 0.15);
      else if (p < 0.30)  speed = 1;
      else if (p < 0.55)  speed = 1;  // still moving during lift
      else if (p < 0.85)  speed = 1 - easeInOutCubic((p - 0.55) / 0.30);
      else                speed = clamp(0.08 + (p - 0.85) * 0.1, 0, 0.15);

      // Exhaust puff: only when gas is on
      const gasOn = footLift < 0.3;

      return { p, footLift, speed, gasOn };
    }

    // ── Draw functions ────────────────────────────────────────────────────────

    function drawRoad(speed) {
      // Sky / ground split
      ctx.fillStyle = COL.bg;
      ctx.fillRect(0, 0, W, H);

      // Ground strip
      ctx.fillStyle = COL.asphalt;
      ctx.fillRect(0, H * 0.55, W, H * 0.45);

      // Road surface
      ctx.fillStyle = COL.road;
      ctx.fillRect(0, H * 0.60, W, H * 0.35);

      // Road edges
      ctx.strokeStyle = COL.roadLine;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, H * 0.60); ctx.lineTo(W, H * 0.60);
      ctx.moveTo(0, H * 0.94); ctx.lineTo(W, H * 0.94);
      ctx.stroke();

      // Centre dashes – scroll with speed
      stripeX -= speed * 12;
      if (stripeX < -80) stripeX += 80;

      ctx.fillStyle = COL.roadLine;
      const dashW = 50, dashH = 4, gap = 30, y = H * 0.77;
      for (let x = stripeX; x < W + 80; x += dashW + gap) {
        ctx.fillRect(x, y - dashH / 2, dashW, dashH);
      }
    }

    function drawCar(speed) {
      const cx = W * 0.42;
      const cy = H * 0.68;

      // Motion blur lines
      if (speed > 0.05) {
        const blurLen = speed * 80;
        const alpha = speed * 0.35;
        ctx.save();
        ctx.globalAlpha = alpha;
        const blurGrad = ctx.createLinearGradient(cx - blurLen - 120, 0, cx - 20, 0);
        blurGrad.addColorStop(0, 'transparent');
        blurGrad.addColorStop(1, COL.carAccent);
        ctx.fillStyle = blurGrad;
        // three horizontal streaks at different heights
        for (const [dy, h] of [[-22, 3], [0, 2], [10, 2]]) {
          ctx.fillRect(cx - blurLen - 120, cy + dy, blurLen + 100, h);
        }
        ctx.restore();
      }

      // Car body – low-profile shape
      ctx.save();

      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.beginPath();
      ctx.ellipse(cx, cy + 32, 105, 8, 0, 0, Math.PI * 2);
      ctx.fill();

      // Lower body
      ctx.fillStyle = COL.car;
      roundRect(ctx, cx - 110, cy - 14, 220, 38, 8);
      ctx.fill();

      // Upper cabin
      ctx.fillStyle = COL.car;
      roundRect(ctx, cx - 60, cy - 42, 130, 32, 10);
      ctx.fill();

      // Windshield + rear window
      ctx.fillStyle = COL.carGlass;
      // front
      ctx.beginPath();
      ctx.moveTo(cx + 28, cy - 38);
      ctx.lineTo(cx + 58, cy - 15);
      ctx.lineTo(cx + 30, cy - 15);
      ctx.lineTo(cx + 16, cy - 38);
      ctx.closePath();
      ctx.fill();
      // rear
      ctx.beginPath();
      ctx.moveTo(cx - 30, cy - 38);
      ctx.lineTo(cx - 58, cy - 15);
      ctx.lineTo(cx - 30, cy - 15);
      ctx.lineTo(cx - 18, cy - 38);
      ctx.closePath();
      ctx.fill();

      // Accent stripe along body
      ctx.strokeStyle = COL.carAccent;
      ctx.lineWidth = 1.5;
      ctx.globalAlpha = 0.5;
      ctx.beginPath();
      ctx.moveTo(cx - 106, cy + 6);
      ctx.lineTo(cx + 106, cy + 6);
      ctx.stroke();
      ctx.globalAlpha = 1;

      // Head lights glow
      if (speed > 0.1) {
        const glowAlpha = speed * 0.7;
        const headGrad = ctx.createRadialGradient(cx + 108, cy - 2, 0, cx + 108, cy - 2, 40);
        headGrad.addColorStop(0, `rgba(240,220,160,${glowAlpha * 0.6})`);
        headGrad.addColorStop(1, 'transparent');
        ctx.fillStyle = headGrad;
        ctx.fillRect(cx + 70, cy - 40, 80, 80);
      }

      // Headlight
      ctx.fillStyle = `rgba(240,220,120,${0.3 + speed * 0.5})`;
      roundRect(ctx, cx + 98, cy - 8, 14, 10, 3);
      ctx.fill();

      // Tail light
      ctx.fillStyle = `rgba(192,64,64,0.7)`;
      roundRect(ctx, cx - 112, cy - 8, 8, 10, 2);
      ctx.fill();

      // Wheels
      for (const wx of [cx - 68, cx + 58]) {
        const wy = cy + 22;
        const rot = (t * speed * 0.18) % (Math.PI * 2);

        // tyre
        ctx.fillStyle = COL.wheel;
        ctx.beginPath();
        ctx.arc(wx, wy, 20, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#222230';
        ctx.lineWidth = 3;
        ctx.stroke();

        // rim
        ctx.strokeStyle = COL.wheelRim;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(wx, wy, 13, 0, Math.PI * 2);
        ctx.stroke();

        // spokes
        ctx.strokeStyle = COL.wheelRim;
        ctx.lineWidth = 1.5;
        for (let s = 0; s < 4; s++) {
          const a = rot + (s * Math.PI) / 2;
          ctx.beginPath();
          ctx.moveTo(wx, wy);
          ctx.lineTo(wx + Math.cos(a) * 12, wy + Math.sin(a) * 12);
          ctx.stroke();
        }
      }

      ctx.restore();
    }

    function drawExhaust(gasOn, speed) {
      const ex = W * 0.42 - 114;
      const ey = H * 0.68 + 4;

      if (!gasOn && speed < 0.1) return;

      ctx.save();
      const puffCount = 3;
      for (let i = 0; i < puffCount; i++) {
        const age = ((t * 0.03 + i / puffCount) % 1);
        const px  = ex - age * 40;
        const py  = ey - age * 10;
        const r   = 4 + age * 14;
        const a   = gasOn
          ? (1 - age) * 0.45
          : (1 - age) * 0.18 * speed;
        ctx.globalAlpha = a;
        ctx.fillStyle = '#888898';
        ctx.beginPath();
        ctx.arc(px, py, r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawPedalPanel(footLift, speed) {
      // Panel positioned bottom-right
      const px = W - 170, py = H - 150;
      const pw = 150,     ph = 130;

      // Panel background
      ctx.fillStyle = COL.panel;
      roundRect(ctx, px, py, pw, ph, 8);
      ctx.fill();
      ctx.strokeStyle = COL.roadLine;
      ctx.lineWidth = 1;
      ctx.stroke();

      // Label
      ctx.fillStyle = COL.textDim;
      ctx.font = '9px monospace';
      ctx.letterSpacing = '1px';
      ctx.fillText('PEDAL CAM', px + 10, py + 16);

      // Pedal base plate
      ctx.fillStyle = '#1a1a26';
      roundRect(ctx, px + 30, py + 28, 90, 80, 4);
      ctx.fill();

      // Gas pedal (rectangle that tilts)
      const pedalPressed = 1 - footLift;  // 0=up, 1=down
      const pedalAngle   = pedalPressed * 0.28;  // radians of tilt
      const pedalX = px + 75;
      const pedalY = py + 88;

      ctx.save();
      ctx.translate(pedalX, pedalY);
      ctx.rotate(pedalAngle);

      // Pedal glow when pressed
      if (pedalPressed > 0.1) {
        ctx.shadowColor = COL.carAccent;
        ctx.shadowBlur  = 12 * pedalPressed;
      }
      ctx.fillStyle = pedalPressed > 0.5 ? COL.pedalOn : COL.pedal;
      roundRect(ctx, -18, -44, 36, 52, 4);
      ctx.fill();
      ctx.shadowBlur = 0;

      // Pedal ridges
      ctx.strokeStyle = pedalPressed > 0.5
        ? 'rgba(200,200,255,0.4)'
        : 'rgba(255,255,255,0.08)';
      ctx.lineWidth = 1;
      for (let i = 0; i < 4; i++) {
        const ry = -36 + i * 11;
        ctx.beginPath();
        ctx.moveTo(-14, ry);
        ctx.lineTo(14, ry);
        ctx.stroke();
      }

      ctx.restore();

      // Pivot dot at bottom of pedal
      ctx.fillStyle = COL.wheelRim;
      ctx.beginPath();
      ctx.arc(pedalX, pedalY + 8, 3, 0, Math.PI * 2);
      ctx.fill();

      // ── Foot / leg ──
      // Ankle position tracks pedal press
      const ankleY = pedalY - 30 - footLift * 22;
      const ankleX = pedalX + 4;

      // Lower leg (shin)
      const kneeX = pedalX - 8;
      const kneeY = py + 30;

      ctx.save();
      ctx.strokeStyle = COL.foot;
      ctx.lineWidth = 9;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(kneeX, kneeY);
      ctx.quadraticCurveTo(kneeX + 10, kneeY + 30, ankleX, ankleY);
      ctx.stroke();

      // Trouser cuff
      ctx.strokeStyle = '#3a3a5a';
      ctx.lineWidth = 11;
      ctx.beginPath();
      ctx.moveTo(kneeX - 2, kneeY);
      ctx.lineTo(kneeX + 2, kneeY + 18);
      ctx.stroke();

      // Shoe
      ctx.save();
      ctx.translate(ankleX, ankleY);
      const shoeAngle = -0.2 + pedalPressed * 0.35;
      ctx.rotate(shoeAngle);
      ctx.fillStyle = COL.footShoe;
      // sole
      roundRect(ctx, -8, 0, 28, 10, 3);
      ctx.fill();
      // upper
      ctx.fillStyle = '#3a2a1a';
      roundRect(ctx, -6, -10, 24, 12, 4);
      ctx.fill();
      // highlight
      ctx.fillStyle = 'rgba(255,220,180,0.06)';
      roundRect(ctx, -4, -8, 18, 5, 2);
      ctx.fill();
      ctx.restore();

      ctx.restore();
    }

    function drawSpeedometer(speed) {
      const cx = 68, cy = H - 68;
      const r  = 46;

      // Dial face
      ctx.save();
      const dialGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
      dialGrad.addColorStop(0, '#1a1a2a');
      dialGrad.addColorStop(1, '#0e0e18');
      ctx.fillStyle = dialGrad;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = COL.roadLine;
      ctx.lineWidth = 2;
      ctx.stroke();

      // Tick marks
      const startA = Math.PI * 0.75;
      const endA   = Math.PI * 2.25;
      const spans  = endA - startA;
      const ticks  = 10;

      for (let i = 0; i <= ticks; i++) {
        const a    = startA + (i / ticks) * spans;
        const isMajor = i % 2 === 0;
        const inner = r - (isMajor ? 14 : 9);
        const outer = r - 4;
        ctx.strokeStyle = i / ticks <= speed
          ? (speed > 0.6 ? COL.danger : COL.speedHi)
          : COL.textDim;
        ctx.lineWidth = isMajor ? 2 : 1;
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(a) * inner, cy + Math.sin(a) * inner);
        ctx.lineTo(cx + Math.cos(a) * outer, cy + Math.sin(a) * outer);
        ctx.stroke();
      }

      // Speed arc
      ctx.save();
      const arcGrad = ctx.createConicalGradient
        ? null  // not widely supported
        : null;
      ctx.strokeStyle = speed > 0.6 ? COL.danger : COL.speedHi;
      ctx.lineWidth = 3;
      ctx.globalAlpha = 0.5;
      ctx.beginPath();
      ctx.arc(cx, cy, r - 8, startA, startA + speed * spans);
      ctx.stroke();
      ctx.restore();

      // Needle
      const needleA = startA + speed * spans;
      ctx.strokeStyle = '#ff6060';
      ctx.lineWidth   = 2;
      ctx.lineCap     = 'round';
      ctx.beginPath();
      ctx.moveTo(cx - Math.cos(needleA) * 8, cy - Math.sin(needleA) * 8);
      ctx.lineTo(cx + Math.cos(needleA) * (r - 10), cy + Math.sin(needleA) * (r - 10));
      ctx.stroke();

      // Centre cap
      ctx.fillStyle = '#555566';
      ctx.beginPath();
      ctx.arc(cx, cy, 5, 0, Math.PI * 2);
      ctx.fill();

      // Speed number
      const kph = Math.round(speed * 120);
      ctx.fillStyle = speed > 0.6 ? COL.danger : COL.speedHi;
      ctx.font = 'bold 14px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(kph, cx, cy + 5);
      ctx.font = '8px monospace';
      ctx.fillStyle = COL.textDim;
      ctx.fillText('km/h', cx, cy + 16);

      ctx.textAlign = 'left';
      ctx.restore();
    }

    function drawStatusText(footLift, speed) {
      ctx.save();

      let label, colour;
      if (footLift < 0.2 && speed > 0.8) {
        label = 'FULL THROTTLE'; colour = COL.danger;
      } else if (footLift < 0.2) {
        label = 'ACCELERATING';  colour = COL.speedHi;
      } else if (footLift > 0.7 && speed > 0.4) {
        label = 'DECELERATING';  colour = COL.gold;
      } else if (speed < 0.12) {
        label = 'COASTING';      colour = COL.textDim;
      } else {
        label = 'EASING OFF...'; colour = COL.gold;
      }

      ctx.font = 'bold 11px monospace';
      ctx.letterSpacing = '2px';
      ctx.fillStyle = colour;
      ctx.globalAlpha = 0.9;
      ctx.fillText(label, W / 2 - ctx.measureText(label).width / 2, 28);

      ctx.restore();
    }

    // ── Utility: rounded rectangle path ──────────────────────────────────────
    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    // ── Main loop ─────────────────────────────────────────────────────────────
    function frame() {
      t++;
      const { footLift, speed, gasOn } = getState();

      drawRoad(speed);
      drawExhaust(gasOn, speed);
      drawCar(speed);
      drawPedalPanel(footLift, speed);
      drawSpeedometer(speed);
      drawStatusText(footLift, speed);

      // Update info tag
      document.getElementById('info').textContent =
        speed < 0.12 ? 'COASTING' :
        footLift > 0.5 ? 'DECELERATING' : 'THROTTLE ON';

      requestAnimationFrame(frame);
    }

    requestAnimationFrame(frame);
  </script>
</body>
</html>
